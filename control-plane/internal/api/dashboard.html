<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="theme-color" content="#0a0c10" />
<title>Watchclaw</title>
<script src="/cytoscape.min.js"></script>
<style>
  :root { --bg:#0a0c10; --panel:#12161d; --line:#1e2530; --txt:#e6eaf0; --muted:#7a8596; --accent:#3dd68c;
          --ok:#3dd68c; --warn:#f0a23d; --crit:#f0506b; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif; overflow:hidden; }
  header { display:flex; align-items:center; gap:10px; padding:13px 16px; border-bottom:1px solid var(--line); }
  header .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent); flex:0 0 auto; }
  header h1 { font-size:14px; font-weight:600; margin:0; letter-spacing:.2px; }
  .tabs { display:flex; gap:4px; margin-left:8px; }
  .tab { font-size:12px; color:var(--muted); padding:5px 11px; border-radius:7px; cursor:pointer; border:1px solid transparent; }
  .tab.active { color:var(--txt); background:var(--panel); border-color:var(--line); }
  header .sub { color:var(--muted); font-size:12px; margin-left:auto; text-align:right; }
  .view { width:100%; height:calc(100vh - 51px); }
  #cy { width:100%; height:100%; touch-action:none; }
  #endpoints { display:none; overflow:auto; padding:14px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; color:var(--muted); font-weight:500; font-size:11px; text-transform:uppercase; letter-spacing:.4px; padding:8px 10px; border-bottom:1px solid var(--line); }
  td { padding:10px; border-bottom:1px solid #161b22; }
  tr:hover td { background:#10141a; }
  .badge { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600; }
  .badge.ok { background:rgba(61,214,140,.15); color:var(--ok); }
  .badge.warning { background:rgba(240,162,61,.15); color:var(--warn); }
  .badge.critical { background:rgba(240,80,107,.16); color:var(--crit); }
  .bar { display:inline-block; width:64px; height:6px; border-radius:3px; background:#1e2530; vertical-align:middle; margin-right:7px; overflow:hidden; }
  .bar > i { display:block; height:100%; }
  .host { font-weight:600; }
  .legend { position:fixed; bottom:14px; left:14px; background:rgba(18,22,29,.92); border:1px solid var(--line);
    border-radius:10px; padding:9px 12px; font-size:11px; color:var(--muted); backdrop-filter:blur(8px); }
  .legend b { color:var(--txt); font-weight:600; display:block; margin-bottom:5px; }
  .legend span { display:inline-flex; align-items:center; gap:5px; margin-right:11px; }
  .legend i { width:9px; height:9px; border-radius:3px; display:inline-block; }
  #endpoints tbody tr { cursor:pointer; }
  #detail { display:none; overflow:auto; padding:14px 16px; }
  #detail .back { color:#5b8cff; cursor:pointer; font-size:12px; display:inline-block; margin-bottom:12px; }
  #detail h2 { font-size:18px; margin:0 0 2px; }
  #detail .meta { color:var(--muted); font-size:12px; margin-bottom:16px; }
  .sec { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:12px; }
  .sec h3 { font-size:12px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); margin:0 0 9px; font-weight:600; }
  .sec h3 .n { color:var(--accent); }
  .kv { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:6px 18px; font-size:13px; }
  .kv div span { color:var(--muted); }
  .mini { width:100%; font-size:12px; }
  .mini td { padding:5px 8px; border-bottom:1px solid #161b22; vertical-align:top; }
  .mini .mut { color:var(--muted); }
  .mono { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11.5px; }
  .empty { color:var(--muted); font-size:12px; }
  @media (max-width:640px){ header h1{font-size:13px} .legend{font-size:10px;left:10px;right:10px;bottom:10px} td,th{padding:7px} }
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>Watchclaw</h1>
  <div class="tabs">
    <span class="tab active" id="tab-topo" onclick="show('topo')">Topology</span>
    <span class="tab" id="tab-ep" onclick="show('ep')">Endpoints</span>
    <span class="tab" id="tab-al" onclick="show('al')">Alerts</span>
  </div>
  <a href="/progress" style="color:#5b8cff;text-decoration:none;font-size:12px;margin-left:10px">Progress ↗</a>
  <span class="sub" id="meta">loading…</span>
</header>

<div class="view" id="cy"></div>
<div class="view" id="endpoints"><table id="ep-table"><thead><tr>
  <th>Health</th><th>Host</th><th>OS</th><th>CPU</th><th>RAM</th><th>Disk</th><th>Last seen</th>
</tr></thead><tbody id="ep-body"></tbody></table></div>
<div class="view" id="alerts-view"><table id="al-table"><thead><tr>
  <th>Severity</th><th>Host</th><th>Type</th><th>Detail</th><th>Since</th><th>Last seen</th>
</tr></thead><tbody id="al-body"></tbody></table></div>
<div class="view" id="detail"></div>

<div class="legend" id="legend">
  <b>Legend</b>
  <span><i style="background:#5b8cff"></i>Internet</span>
  <span><i style="background:#f0a23d"></i>Router/GW</span>
  <span><i style="background:#3dd6c4"></i>Workstation</span>
  <span><i style="background:#3dd68c"></i>Server</span>
  <span><i style="background:#f0d23d"></i>Printer</span>
  <span><i style="background:#b07cf0"></i>NAS</span>
  <span><i style="background:#f0506b"></i>Camera</span>
  <span><i style="background:#5fd0e0"></i>Phone</span>
  <span><i style="background:#f59e6c"></i>IoT</span>
  <span><i style="background:#8a93a5"></i>Device</span>
</div>

<script>
const COLORS = {
  internet:"#5b8cff", gateway:"#f0a23d", router:"#f0a23d", network:"#8a93a5",
  workstation:"#3dd6c4", endpoint:"#3dd6c4", server:"#3dd68c",
  printer:"#f0d23d", nas:"#b07cf0", camera:"#f0506b", phone:"#5fd0e0",
  media:"#e07cf0", iot:"#f59e6c", device:"#8a93a5"
};
const HEALTH = { ok:"#3dd68c", warning:"#f0a23d", critical:"#f0506b" };
let cy = null, view = "topo";

function pad(n){ return String(n).padStart(2,"0"); }
function hm(){ const d=new Date(); return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds()); }

function show(v){
  view = v;
  document.getElementById("cy").style.display = v==="topo" ? "block" : "none";
  document.getElementById("endpoints").style.display = v==="ep" ? "block" : "none";
  document.getElementById("alerts-view").style.display = v==="al" ? "block" : "none";
  document.getElementById("detail").style.display = v==="detail" ? "block" : "none";
  document.getElementById("legend").style.display = v==="topo" ? "block" : "none";
  document.getElementById("tab-topo").classList.toggle("active", v==="topo");
  document.getElementById("tab-ep").classList.toggle("active", v==="ep");
  document.getElementById("tab-al").classList.toggle("active", v==="al");
  refresh();
}

function bar(pct, color){
  const p = Math.max(0, Math.min(100, pct||0));
  return '<span class="bar"><i style="width:'+p+'%;background:'+color+'"></i></span>'+p.toFixed(0)+'%';
}
function barColor(p){ return p>=90?HEALTH.critical : p>=75?HEALTH.warning : HEALTH.ok; }

async function loadEndpoints(){
  const eps = await (await fetch("/v1/endpoints",{cache:"no-store"})).json();
  const body = document.getElementById("ep-body");
  if (!eps || !eps.length){ body.innerHTML = '<tr><td colspan="7" style="color:#7a8596">No endpoints reporting yet…</td></tr>'; return; }
  body.innerHTML = eps.map(e => '<tr onclick="openDetail(\''+encodeURIComponent(e.hostname)+'\')">'+
    '<td><span class="badge '+e.health+'">'+e.health+'</span></td>'+
    '<td class="host">'+e.hostname+' <span style="color:#5b8cff;font-size:11px">details ›</span></td>'+
    '<td style="color:#7a8596">'+(e.os||"")+' '+(e.os_version||"")+'</td>'+
    '<td>'+bar(e.cpu_usage_pct, barColor(e.cpu_usage_pct))+'</td>'+
    '<td>'+bar(e.mem_usage_pct, barColor(e.mem_usage_pct))+'</td>'+
    '<td>'+bar(e.disk_usage_pct, barColor(e.disk_usage_pct))+'</td>'+
    '<td style="color:#7a8596">'+(e.last_seen||"").replace("T"," ").replace("Z","")+'</td>'+
  '</tr>').join("");
  document.getElementById("meta").textContent = eps.length+" endpoints · "+hm();
}

async function loadTopology(){
  const g = await (await fetch("/v1/topology",{cache:"no-store"})).json();
  document.getElementById("meta").textContent = (g.subnet||"—")+" · "+(g.nodes?.length||0)+" nodes · "+hm();
  const elements = [
    ...(g.nodes||[]).map(n => ({ data:{ id:n.id, label:n.label, type:n.type }})),
    ...(g.edges||[]).map(e => ({ data:{ source:e.from, target:e.to, etype:e.type }})),
  ];
  if (!cy){
    cy = cytoscape({ container: document.getElementById("cy"), elements,
      style:[
        { selector:"node", style:{ "background-color": ele=>COLORS[ele.data("type")]||COLORS.device,
          "label":"data(label)","color":"#e6eaf0","font-size":"11px","text-valign":"bottom","text-margin-y":"6px",
          "width":"34px","height":"34px","border-width":"2px","border-color":"#0a0c10" }},
        { selector:'node[type="internet"]', style:{ "width":"46px","height":"46px" }},
        { selector:'node[type="gateway"]', style:{ "width":"42px","height":"42px" }},
        { selector:"edge", style:{ "width":1.5,"line-color":"#2a3340","curve-style":"straight","opacity":0.7 }},
        { selector:'edge[etype="wan"]', style:{ "line-color":"#5b8cff","width":2.5 }},
      ],
      layout:{ name:"breadthfirst", roots:"#internet", directed:true, spacingFactor:1.5, padding:30 } });
  } else {
    cy.json({ elements });
    cy.layout({ name:"breadthfirst", roots:"#internet", directed:true, spacingFactor:1.5, padding:30 }).run();
  }
}

async function loadAlerts(){
  const al = await (await fetch("/v1/alerts",{cache:"no-store"})).json();
  const body = document.getElementById("al-body");
  if (!al || !al.length){
    body.innerHTML = '<tr><td colspan="6" style="color:#7a8596">No open alerts — all clear.</td></tr>';
    document.getElementById("meta").textContent = "0 open alerts · "+hm();
    return;
  }
  body.innerHTML = al.map(a => '<tr>'+
    '<td><span class="badge '+a.severity+'">'+a.severity+'</span></td>'+
    '<td class="host">'+a.hostname+'</td>'+
    '<td style="color:#7a8596">'+a.kind+'</td>'+
    '<td>'+a.message+(a.count>1?' <span style="color:#7a8596">×'+a.count+'</span>':'')+'</td>'+
    '<td style="color:#7a8596">'+(a.first_seen||"").replace("T"," ").replace("Z","")+'</td>'+
    '<td style="color:#7a8596">'+(a.last_seen||"").replace("T"," ").replace("Z","")+'</td>'+
  '</tr>').join("");
  document.getElementById("meta").textContent = al.length+" open alerts · "+hm();
}

// Keep the Alerts tab label live (count + color) from any view.
async function updateAlertBadge(){
  try {
    const al = await (await fetch("/v1/alerts",{cache:"no-store"})).json();
    const n = al ? al.length : 0;
    const t = document.getElementById("tab-al");
    t.textContent = n ? "Alerts ("+n+")" : "Alerts";
    t.style.color = n ? (al.some(a=>a.severity==="critical")?HEALTH.critical:HEALTH.warning) : "";
  } catch(e){ /* badge is best-effort */ }
}

function esc(s){ return String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function kv(k,v){ return '<div><span>'+esc(k)+':</span> '+esc(v===0?0:(v||"—"))+'</div>'; }
function secList(title,n,rows){
  if(!n) return '<div class="sec"><h3>'+esc(title)+' <span class="n">0</span></h3><div class="empty">none</div></div>';
  return '<div class="sec"><h3>'+esc(title)+' <span class="n">'+n+'</span></h3><table class="mini"><tbody>'+rows+'</tbody></table></div>';
}
function fmtUptime(s){ s=s||0; return Math.floor(s/86400)+"d "+Math.floor(s%86400/3600)+"h"; }
function pct(v){ return (v==null?0:v).toFixed(0); }

async function openDetail(hostEnc){
  view="detail";
  ["cy","endpoints","alerts-view","legend"].forEach(id=>document.getElementById(id).style.display="none");
  const el=document.getElementById("detail"); el.style.display="block";
  const host=decodeURIComponent(hostEnc);
  el.innerHTML='<span class="back" onclick="show(\'ep\')">&lsaquo; back to endpoints</span><div class="empty">loading '+esc(host)+'…</div>';
  document.getElementById("meta").textContent=host;
  try {
    const d=await (await fetch("/v1/endpoint/"+hostEnc,{cache:"no-store"})).json();
    renderDetail(el,d);
  } catch(e){ el.innerHTML+='<div class="empty">error: '+esc(e.message)+'</div>'; }
}

function renderDetail(el,d){
  const h=d.hardware||{}, sys=h.system||{}, conns=h.connections||[];
  const est=conns.filter(c=>c.state==="Established"), lis=conns.filter(c=>c.state==="Listen");
  let html='<span class="back" onclick="show(\'ep\')">&lsaquo; back to endpoints</span>';
  html+='<h2>'+esc(d.hostname)+'</h2>';
  html+='<div class="meta">'+esc(d.os)+' '+esc(d.os_version)+(sys.model?' · '+esc(sys.model):"")+' · collected '+esc((d.collected_at||"").replace("T"," ").replace("Z",""))+'</div>';
  html+='<div class="sec"><h3>System</h3><div class="kv">'+
    kv("Model",sys.model)+kv("Manufacturer",sys.manufacturer)+kv("BIOS serial",sys.bios_serial)+kv("Baseboard serial",sys.baseboard_serial)+
    kv("CPU",(d.cpu_cores||"?")+" cores · "+pct(d.cpu_usage_pct)+"%")+
    kv("Memory",pct(d.mem_usage_pct)+"% ("+Math.round((d.mem_used_mb||0)/1024)+"/"+Math.round((d.mem_total_mb||0)/1024)+" GB)")+
    kv("Uptime",fmtUptime(d.uptime_seconds))+'</div></div>';
  html+=secList("Pending updates",(h.available_updates||[]).length,(h.available_updates||[]).map(u=>'<tr><td>'+esc(u.id||u.name)+'</td><td class="mut">'+esc(u.current)+' → '+esc(u.available)+'</td></tr>').join(""));
  html+=secList("Established connections",est.length,est.map(c=>'<tr><td class="mono">'+esc(c.local)+' → '+esc(c.remote)+'</td><td class="mut">'+esc(c.process)+'</td></tr>').join(""));
  html+=secList("Listening ports",lis.length,lis.map(c=>'<tr><td class="mono">'+esc(c.local)+'</td><td class="mut">'+esc(c.process)+'</td></tr>').join(""));
  html+=secList("Auto-start services",(h.services||[]).length,(h.services||[]).map(s=>'<tr><td>'+esc(s.name)+' <span class="mut">'+esc(s.state)+'</span></td><td class="mut mono">'+esc(s.path)+'</td></tr>').join(""));
  html+=secList("Startup items",(h.startup_items||[]).length,(h.startup_items||[]).map(s=>'<tr><td>'+esc(s.name)+' <span class="mut">'+esc(s.location)+'</span></td><td class="mut mono">'+esc(s.command)+'</td></tr>').join(""));
  html+='<div class="sec"><h3>Inventory</h3><div class="kv">'+
    kv("Software",(h.software||[]).length)+kv("USB devices",(h.usb_devices||[]).length)+kv("Hotfixes",(h.hotfixes||[]).length)+kv("SMART warnings",(h.disk_health_warnings||[]).length)+'</div></div>';
  el.innerHTML=html;
}

async function refresh(){
  try {
    if (view==="detail") { updateAlertBadge(); return; }
    if (view==="ep") await loadEndpoints();
    else if (view==="al") await loadAlerts();
    else await loadTopology();
    updateAlertBadge();
  }
  catch(e){ document.getElementById("meta").textContent = "error: "+e.message; }
}
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>

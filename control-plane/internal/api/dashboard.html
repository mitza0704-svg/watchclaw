<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="theme-color" content="#0a0c10" />
<title>Watchclaw</title>
<script src="/cytoscape.min.js"></script>
<style>
  :root { --bg:#0a0c10; --panel:#12161d; --line:#1e2530; --txt:#e6eaf0; --muted:#7a8596; --accent:#3dd68c;
          --ok:#3dd68c; --warn:#f0a23d; --crit:#f0506b; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif; overflow:hidden; }
  header { display:flex; align-items:center; gap:8px; padding:12px 16px; border-bottom:1px solid var(--line); }
  header .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent); flex:0 0 auto; }
  header h1 { font-size:14px; font-weight:600; margin:0; letter-spacing:.2px; }
  .tabs { display:flex; gap:4px; margin-left:8px; }
  .tab { font-size:12px; color:var(--muted); padding:5px 11px; border-radius:7px; cursor:pointer; border:1px solid transparent; }
  .tab.active { color:var(--txt); background:var(--panel); border-color:var(--line); }
  header .sub { color:var(--muted); font-size:12px; margin-left:auto; text-align:right; }
  .view { width:100%; height:calc(100vh - 51px); }
  #cy { width:100%; height:100%; touch-action:none; }
  #endpoints { display:none; overflow:auto; padding:14px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; color:var(--muted); font-weight:500; font-size:11px; text-transform:uppercase; letter-spacing:.4px; padding:8px 10px; border-bottom:1px solid var(--line); }
  td { padding:10px; border-bottom:1px solid #161b22; }
  tr:hover td { background:#10141a; }
  .badge { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600; }
  .badge.ok { background:rgba(61,214,140,.15); color:var(--ok); }
  .badge.warning { background:rgba(240,162,61,.15); color:var(--warn); }
  .badge.critical { background:rgba(240,80,107,.16); color:var(--crit); }
  .bar { display:inline-block; width:64px; height:6px; border-radius:3px; background:#1e2530; vertical-align:middle; margin-right:7px; overflow:hidden; }
  .bar > i { display:block; height:100%; }
  .host { font-weight:600; }
  .legend { position:fixed; bottom:16px; left:16px; background:var(--panel); border:1px solid var(--line);
    border-radius:10px; padding:8px 12px; font-size:11px; color:var(--muted); max-width:calc(100vw - 32px); }
  #topo-detail { display:none; position:fixed; top:51px; right:0; width:280px; height:calc(100vh - 51px);
    background:var(--panel); border-left:1px solid var(--line); padding:20px 16px; overflow-y:auto; z-index:100; }
  #topo-detail #td-x { position:absolute; top:12px; right:14px; cursor:pointer; color:var(--muted); font-size:20px; line-height:1; }
  #topo-detail #td-type { font-size:10px; text-transform:uppercase; letter-spacing:.6px; margin-bottom:4px; }
  #topo-detail #td-label { font-size:16px; font-weight:600; margin-bottom:12px; word-break:break-all; }
  #topo-detail #td-health { margin-bottom:16px; }
  .legend b { color:var(--txt); font-weight:600; display:block; margin-bottom:5px; }
  .legend span { display:inline-flex; align-items:center; gap:5px; margin-right:11px; }
  .legend i { width:9px; height:9px; border-radius:3px; display:inline-block; }
  #endpoints tbody tr { cursor:pointer; }
  #detail { display:none; overflow:auto; padding:14px 16px; }
  #detail .back { color:#5b8cff; cursor:pointer; font-size:12px; display:inline-block; margin-bottom:12px; }
  #detail h2 { font-size:18px; margin:0 0 2px; }
  #detail .meta { color:var(--muted); font-size:12px; margin-bottom:16px; }
  .sec { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:12px; }
  .sec h3 { font-size:12px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); margin:0 0 9px; font-weight:600; }
  .sec h3 .n { color:var(--accent); }
  .kv { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:6px 18px; font-size:13px; }
  .kv div span { color:var(--muted); }
  .mini { width:100%; font-size:12px; }
  .mini td { padding:5px 8px; border-bottom:1px solid #161b22; vertical-align:top; }
  .mini .mut { color:var(--muted); }
  .mono { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:11.5px; }
  .empty { color:var(--muted); font-size:12px; }
  #detail .cards { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  #detail .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:11px 14px; min-width:118px; flex:1; }
  #detail .card .num { font-size:22px; font-weight:600; line-height:1.1; }
  #detail .card .lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-top:3px; }
  #detail .card .sub { font-size:11px; color:var(--muted); margin-top:3px; }
  details.acc { background:var(--panel); border:1px solid var(--line); border-radius:10px; margin-bottom:10px; }
  details.acc > summary { list-style:none; cursor:pointer; padding:11px 14px; display:flex; align-items:center; gap:8px; font-size:12px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); font-weight:600; }
  details.acc > summary::-webkit-details-marker { display:none; }
  details.acc > summary::before { content:"▸"; color:var(--muted); display:inline-block; transition:transform .15s; }
  details.acc[open] > summary::before { transform:rotate(90deg); }
  details.acc > summary .n { color:var(--accent); }
  details.acc .body { padding:0 14px 12px; }
  .dot-ext { color:var(--crit); }
  @media (max-width:640px){ header h1{font-size:13px} .legend{font-size:10px;left:10px;right:10px;bottom:10px} td,th{padding:7px} }
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <h1>Watchclaw</h1>
  <div class="tabs">
    <span class="tab active" id="tab-topo" onclick="show('topo')">Topology</span>
    <span class="tab" id="tab-ep" onclick="show('ep')">Endpoints</span>
    <span class="tab" id="tab-al" onclick="show('al')">Alerts</span>
  </div>
  <a href="/progress" style="color:#5b8cff;text-decoration:none;font-size:12px;margin-left:10px">Progress ↗</a>
  <span class="sub" id="meta">loading…</span>
</header>

<div class="view" id="cy"></div>
<div class="view" id="endpoints"><table id="ep-table"><thead><tr>
  <th>Health</th><th>Host</th><th>OS</th><th>CPU</th><th>RAM</th><th>Disk</th><th>Last seen</th>
</tr></thead><tbody id="ep-body"></tbody></table></div>
<div class="view" id="alerts-view"><table id="al-table"><thead><tr>
  <th>Severity</th><th>Host</th><th>Type</th><th>Detail</th><th>Since</th><th>Last seen</th>
</tr></thead><tbody id="al-body"></tbody></table></div>
<div class="view" id="detail"></div>
<div id="topo-detail">
  <div id="td-x" onclick="hideTopoDetail()">×</div>
  <div id="td-type"></div>
  <div id="td-label"></div>
  <div id="td-health"></div>
  <div id="td-fields" style="display:grid;gap:9px"></div>
</div>

<div class="legend" id="legend">
  <b>Legend</b>
  <span><i style="background:#5b8cff"></i>Internet</span>
  <span><i style="background:#f0a23d"></i>Router/GW</span>
  <span><i style="background:#3dd6c4"></i>Workstation</span>
  <span><i style="background:#3dd68c"></i>Server</span>
  <span><i style="background:#f0d23d"></i>Printer</span>
  <span><i style="background:#b07cf0"></i>NAS</span>
  <span><i style="background:#f0506b"></i>Camera</span>
  <span><i style="background:#5fd0e0"></i>Phone</span>
  <span><i style="background:#f59e6c"></i>IoT</span>
  <span><i style="background:#8a93a5"></i>Device</span>
</div>

<script>
const COLORS = {
  internet:"#5b8cff", gateway:"#f0a23d", router:"#f0a23d", network:"#8a93a5",
  workstation:"#3dd6c4", endpoint:"#3dd6c4", server:"#3dd68c",
  printer:"#f0d23d", nas:"#b07cf0", camera:"#f0506b", phone:"#5fd0e0",
  media:"#e07cf0", iot:"#f59e6c", device:"#8a93a5"
};
const HEALTH = { ok:"#3dd68c", warning:"#f0a23d", critical:"#f0506b" };
let cy = null, view = "topo", prevView = "ep";

function pad(n){ return String(n).padStart(2,"0"); }
function hm(){ const d=new Date(); return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds()); }

function show(v){
  view = v;
  document.getElementById("cy").style.display = v==="topo" ? "block" : "none";
  document.getElementById("endpoints").style.display = v==="ep" ? "block" : "none";
  document.getElementById("alerts-view").style.display = v==="al" ? "block" : "none";
  document.getElementById("detail").style.display = v==="detail" ? "block" : "none";
  document.getElementById("legend").style.display = v==="topo" ? "block" : "none";
  document.getElementById("tab-topo").classList.toggle("active", v==="topo");
  document.getElementById("tab-ep").classList.toggle("active", v==="ep");
  document.getElementById("tab-al").classList.toggle("active", v==="al");
  refresh();
}

function bar(pct, color){
  const p = Math.max(0, Math.min(100, pct||0));
  return '<span class="bar"><i style="width:'+p+'%;background:'+color+'"></i></span>'+p.toFixed(0)+'%';
}
function barColor(p){ return p>=90?HEALTH.critical : p>=75?HEALTH.warning : HEALTH.ok; }

async function loadEndpoints(){
  const eps = await (await fetch("/v1/endpoints",{cache:"no-store"})).json();
  const body = document.getElementById("ep-body");
  if (!eps || !eps.length){ body.innerHTML = '<tr><td colspan="7" style="color:#7a8596">No endpoints reporting yet…</td></tr>'; return; }
  body.innerHTML = eps.map(e => '<tr onclick="openDetail(\''+encodeURIComponent(e.hostname)+'\')">'+
    '<td><span class="badge '+e.health+'">'+e.health+'</span></td>'+
    '<td class="host">'+e.hostname+' <span style="color:#5b8cff;font-size:11px">details ›</span></td>'+
    '<td style="color:#7a8596">'+(e.os||"")+' '+(e.os_version||"")+'</td>'+
    '<td>'+bar(e.cpu_usage_pct, barColor(e.cpu_usage_pct))+'</td>'+
    '<td>'+bar(e.mem_usage_pct, barColor(e.mem_usage_pct))+'</td>'+
    '<td>'+bar(e.disk_usage_pct, barColor(e.disk_usage_pct))+'</td>'+
    '<td style="color:#7a8596">'+(e.last_seen||"").replace("T"," ").replace("Z","")+'</td>'+
  '</tr>').join("");
  document.getElementById("meta").textContent = eps.length+" endpoints · "+hm();
}

// Per-type line-icon glyphs rendered as inline-SVG data-URIs for node background.
function svgIcon(paths){
  const svg="<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='#e6eaf0' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'>"+paths+"</svg>";
  return "data:image/svg+xml,"+encodeURIComponent(svg);
}
const ICONS = {
  internet:    svgIcon("<path d='M6.5 19 A4.5 4.5 0 0 1 6.5 10 A6 6 0 0 1 18 10.5 A3.5 3.5 0 0 1 17.5 17 Z'/><path d='M8 19 L16 19'/>"),
  gateway:     svgIcon("<path d='M12 3 L20 7.5 L20 16.5 L12 21 L4 16.5 L4 7.5 Z'/><path d='M12 3 L12 21 M4 7.5 L20 7.5 M4 16.5 L20 16.5'/>"),
  router:      svgIcon("<path d='M12 3 L20 7.5 L20 16.5 L12 21 L4 16.5 L4 7.5 Z'/><path d='M12 3 L12 21 M4 7.5 L20 7.5 M4 16.5 L20 16.5'/>"),
  network:     svgIcon("<path d='M2 4 L22 4 L22 9 L2 9 Z'/><path d='M6 9 L6 15 M12 9 L12 15 M18 9 L18 15 M4 15 L8 15 M10 15 L14 15 M16 15 L20 15'/>"),
  workstation: svgIcon("<path d='M5 3 L19 3 Q21 3 21 5 L21 15 Q21 17 19 17 L5 17 Q3 17 3 15 L3 5 Q3 3 5 3 Z'/><path d='M9 17 L9 21 M15 17 L15 21 M7 21 L17 21'/>"),
  endpoint:    svgIcon("<path d='M5 3 L19 3 Q21 3 21 5 L21 15 Q21 17 19 17 L5 17 Q3 17 3 15 L3 5 Q3 3 5 3 Z'/><path d='M9 17 L9 21 M15 17 L15 21 M7 21 L17 21'/>"),
  server:      svgIcon("<path d='M3 5 L21 5 L21 9 L3 9 Z'/><path d='M3 10 L21 10 L21 14 L3 14 Z'/><path d='M3 15 L21 15 L21 19 L3 19 Z'/><path d='M17 7 L19 7 M17 12 L19 12 M17 17 L19 17'/>"),
  printer:     svgIcon("<path d='M6 9 L6 3 L18 3 L18 9'/><path d='M6 18 L4 18 Q3 18 3 17 L3 11 Q3 10 4 10 L20 10 Q21 10 21 11 L21 17 Q21 18 20 18 L18 18'/><path d='M6 18 L6 21 L18 21 L18 18 Z'/>"),
  nas:         svgIcon("<path d='M3 4 L21 4 L21 20 L3 20 Z'/><path d='M3 8 L21 8 M3 12 L21 12 M3 16 L21 16'/><path d='M7 6 L7.01 6 M7 10 L7.01 10 M7 14 L7.01 14'/>"),
  camera:      svgIcon("<path d='M23 7 L16 12 L23 17 Z'/><path d='M16 5 L2 5 Q1 5 1 6 L1 18 Q1 19 2 19 L16 19 Q17 19 17 18 L17 6 Q17 5 16 5 Z'/>"),
  phone:       svgIcon("<path d='M17 2 L7 2 Q5 2 5 4 L5 20 Q5 22 7 22 L17 22 Q19 22 19 20 L19 4 Q19 2 17 2 Z'/><path d='M9 18 L15 18'/>"),
  media:       svgIcon("<path d='M20 7 L4 7 Q2 7 2 9 L2 17 Q2 19 4 19 L20 19 Q22 19 22 17 L22 9 Q22 7 20 7 Z'/><path d='M8 19 L16 19 M9 11 L15 13 L9 15 Z'/>"),
  iot:         svgIcon("<path d='M12 12 m-2 0 a2 2 0 1 0 4 0 a2 2 0 1 0 -4 0'/><path d='M8.5 8.5 A5 5 0 0 0 8.5 15.5 M15.5 8.5 A5 5 0 0 1 15.5 15.5 M5.5 5.5 A9 9 0 0 0 5.5 18.5 M18.5 5.5 A9 9 0 0 1 18.5 18.5'/>"),
  device:      svgIcon("<path d='M12 3 L20 8 L20 16 L12 21 L4 16 L4 8 Z'/>"),
};
function icon(t){ return ICONS[t] || ICONS.device; }
function tint(t){ return (COLORS[t]||COLORS.device)+"22"; }   // ~13% type-color fill

async function loadTopology(){
  const [g, eps] = await Promise.all([
    fetch("/v1/topology",{cache:"no-store"}).then(r=>r.json()),
    fetch("/v1/endpoints",{cache:"no-store"}).then(r=>r.json()).catch(()=>[]),
  ]);
  const epByHost = {}; (eps||[]).forEach(e => epByHost[e.hostname] = e);
  document.getElementById("meta").textContent = (g.subnet||"—")+" · "+(g.nodes?.length||0)+" devices · "+hm();
  const elements = [
    ...(g.nodes||[]).map(n => { const ep = epByHost[n.label] || {};
      return { data:{ id:n.id, label:n.label, type:n.type, ip:n.ip, mac:n.mac, vendor:n.nic_vendor,
        health: ep.health || "", last_seen: ep.last_seen || "" }}; }),
    ...(g.edges||[]).map(e => ({ data:{ source:e.from, target:e.to, etype:e.type }})),
  ];
  const layout = { name:"concentric", concentric: n => n.data("type")==="internet" ? 3 : (n.data("type")==="gateway"||n.data("type")==="router") ? 2 : 1,
    levelWidth: ()=>1, minNodeSpacing: 34, startAngle: Math.PI*3/2, sweep: Math.PI*2, padding: 64, avoidOverlap: true, fit: true };
  if (!cy){
    cy = cytoscape({ container: document.getElementById("cy"), elements, wheelSensitivity:0.2,
      style:[
        { selector:"node", style:{
          "background-color": ele=>tint(ele.data("type")),
          "background-image": ele=>icon(ele.data("type")), "background-fit":"contain","background-width":"60%","background-height":"60%",
          "border-width":1.5, "border-color": ele=>COLORS[ele.data("type")]||COLORS.device,
          "width":"40px","height":"40px",
          "label": ele=>{ const l=ele.data("label")||""; return l.length>13 ? l.slice(0,12)+"…" : l; },
          "color":"#e6eaf0","font-size":"10px","text-valign":"bottom","text-margin-y":5,"text-halign":"center",
          "text-background-color":"#0a0c10","text-background-opacity":0.9,"text-background-padding":3,"text-background-shape":"roundrectangle",
          "min-zoomed-font-size":7 }},
        { selector:'node[type="internet"]', style:{ "width":"62px","height":"62px","border-color":"#5b8cff" }},
        { selector:'node[type="gateway"],node[type="router"]', style:{ "width":"54px","height":"54px","border-width":2.5 }},
        { selector:'node[health="warning"]', style:{ "border-color":"#f0a23d","border-width":3 }},
        { selector:'node[health="critical"]', style:{ "border-color":"#f0506b","border-width":3 }},
        { selector:'node:selected', style:{ "border-color":"#3dd68c","border-width":3,
          "label":"data(label)","font-size":"12px" }},
        { selector:"node:active", style:{ "overlay-opacity":0.1,"overlay-color":"#3dd68c" }},
        { selector:"edge", style:{ "width":1,"line-color":"#2d3d52","curve-style":"straight","opacity":1 }},
        { selector:'edge[etype="wan"]', style:{ "line-color":"#5b8cff","width":2,"line-style":"dashed","line-dash-pattern":[6,4] }},
      ],
      layout });
    cy.on("tap","node", evt => showTopoDetail(evt.target.data()));
    cy.on("tap", evt => { if (evt.target === cy) hideTopoDetail(); });
  } else {
    cy.json({ elements });
    cy.layout(layout).run();
  }
}

function showTopoDetail(d){
  const p = document.getElementById("topo-detail");
  const col = COLORS[d.type] || COLORS.device;
  document.getElementById("td-type").textContent = d.type || "device";
  document.getElementById("td-type").style.color = col;
  document.getElementById("td-label").textContent = d.label || d.id;
  document.getElementById("td-health").innerHTML = d.health ? '<span class="badge '+d.health+'">'+d.health+'</span>' : '';
  const f = [["IP",d.ip],["MAC",d.mac],["NIC vendor",d.vendor],["Last seen",(d.last_seen||"").replace("T"," ").replace("Z","")]];
  document.getElementById("td-fields").innerHTML = f.map(([k,v]) =>
    '<div><div style="font-size:10px;color:#7a8596;margin-bottom:2px">'+k+'</div><div class="mono" style="font-size:12px">'+(v||"—")+'</div></div>').join("");
  p.style.display="block";
}
function hideTopoDetail(){ document.getElementById("topo-detail").style.display="none"; }

async function loadAlerts(){
  const al = await (await fetch("/v1/alerts",{cache:"no-store"})).json();
  const body = document.getElementById("al-body");
  if (!al || !al.length){
    body.innerHTML = '<tr><td colspan="6" style="color:#7a8596">No open alerts — all clear.</td></tr>';
    document.getElementById("meta").textContent = "0 open alerts · "+hm();
    return;
  }
  body.innerHTML = al.map(a => '<tr>'+
    '<td><span class="badge '+a.severity+'">'+a.severity+'</span></td>'+
    '<td class="host">'+a.hostname+'</td>'+
    '<td style="color:#7a8596">'+a.kind+'</td>'+
    '<td>'+a.message+(a.count>1?' <span style="color:#7a8596">×'+a.count+'</span>':'')+'</td>'+
    '<td style="color:#7a8596">'+(a.first_seen||"").replace("T"," ").replace("Z","")+'</td>'+
    '<td style="color:#7a8596">'+(a.last_seen||"").replace("T"," ").replace("Z","")+'</td>'+
  '</tr>').join("");
  document.getElementById("meta").textContent = al.length+" open alerts · "+hm();
}

// Keep the Alerts tab label live (count + color) from any view.
async function updateAlertBadge(){
  try {
    const al = await (await fetch("/v1/alerts",{cache:"no-store"})).json();
    const n = al ? al.length : 0;
    const t = document.getElementById("tab-al");
    t.textContent = n ? "Alerts ("+n+")" : "Alerts";
    t.style.color = n ? (al.some(a=>a.severity==="critical")?HEALTH.critical:HEALTH.warning) : "";
  } catch(e){ /* badge is best-effort */ }
}

function esc(s){ return String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function kv(k,v){ return '<div><span>'+esc(k)+':</span> '+esc(v===0?0:(v||"—"))+'</div>'; }
function secList(title,n,rows){
  if(!n) return '<div class="sec"><h3>'+esc(title)+' <span class="n">0</span></h3><div class="empty">none</div></div>';
  return '<div class="sec"><h3>'+esc(title)+' <span class="n">'+n+'</span></h3><table class="mini"><tbody>'+rows+'</tbody></table></div>';
}
function fmtUptime(s){ s=s||0; return Math.floor(s/86400)+"d "+Math.floor(s%86400/3600)+"h"; }
function pct(v){ return (v==null?0:v).toFixed(0); }

async function openDetail(hostEnc){
  if (view && view!=="detail") prevView=view;
  view="detail";
  ["cy","endpoints","alerts-view","legend"].forEach(id=>document.getElementById(id).style.display="none");
  const el=document.getElementById("detail"); el.style.display="block";
  const host=decodeURIComponent(hostEnc);
  el.innerHTML='<span class="back" onclick="show(\'ep\')">&lsaquo; back to endpoints</span><div class="empty">loading '+esc(host)+'…</div>';
  document.getElementById("meta").textContent=host;
  try {
    const d=await (await fetch("/v1/endpoint/"+hostEnc,{cache:"no-store"})).json();
    renderDetail(el,d);
  } catch(e){ el.innerHTML+='<div class="empty">error: '+esc(e.message)+'</div>'; }
}

function isPriv(ip){ return /^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[01])\.|127\.|::1|fe80|169\.254|fd|fc)/i.test(ip||""); }
function ipOf(addr){ const a=String(addr||""); const i=a.lastIndexOf(":"); return i>0?a.slice(0,i):a; }
function card(num,lbl,color,sub){
  return '<div class="card"><div class="num"'+(color?' style="color:'+color+'"':'')+'>'+num+'</div>'+
    '<div class="lbl">'+esc(lbl)+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div>';
}
// collapsible accordion section; open=true expands by default
function acc(title,n,rowsHtml,open){
  if(!n) return '<details class="acc"><summary>'+esc(title)+' <span class="n">0</span></summary><div class="body"><div class="empty">none</div></div></details>';
  return '<details class="acc"'+(open?' open':'')+'><summary>'+esc(title)+' <span class="n">'+n+'</span></summary>'+
    '<div class="body"><table class="mini"><tbody>'+rowsHtml+'</tbody></table></div></details>';
}

function renderDetail(el,d){
  const h=d.hardware||{}, sys=h.system||{}, conns=h.connections||[];
  const est=conns.filter(c=>c.state==="Established"), lis=conns.filter(c=>c.state==="Listen");
  const ups=h.available_updates||[], svcs=h.services||[], starts=h.startup_items||[];
  const ext=est.filter(c=>!isPriv(ipOf(c.remote)));         // external connections = anomaly surface
  const worstDisk=pct(d.disk_usage_pct), health=d.health||"ok";

  let html='<span class="back" onclick="show(\''+(prevView||"ep")+'\')">&lsaquo; back</span>';
  html+='<h2>'+esc(d.hostname)+'</h2>';
  html+='<div class="meta">'+esc(d.os)+' '+esc(d.os_version)+(sys.model?' · '+esc(sys.model):"")+' · collected '+esc((d.collected_at||"").replace("T"," ").replace("Z",""))+'</div>';

  // --- summary cards (Atera-style, scannable; counts not dumps) ---
  html+='<div class="cards">'+
    card(health, "Health", HEALTH[health]||"")+
    card(pct(d.cpu_usage_pct)+"·"+pct(d.mem_usage_pct)+"·"+worstDisk, "CPU·RAM·Disk %", null,
      "cpu / ram / disk")+
    card(ups.length, "Updates pending", ups.length?HEALTH.warning:HEALTH.ok)+
    card(est.length, "Connections", null, ext.length?('<span class="dot-ext">'+ext.length+' external</span>'):"all internal")+
    card(lis.length, "Listening", null, "open ports")+
    card(svcs.length, "Auto-svc", null, "persistent")+
  '</div>';

  // --- system (open) ---
  html+='<details class="acc" open><summary>System</summary><div class="body"><div class="kv">'+
    kv("Model",sys.model)+kv("Manufacturer",sys.manufacturer)+kv("BIOS serial",sys.bios_serial)+kv("Baseboard serial",sys.baseboard_serial)+
    kv("CPU",(d.cpu_cores||"?")+" cores · "+pct(d.cpu_usage_pct)+"%")+
    kv("Memory",pct(d.mem_usage_pct)+"% ("+Math.round((d.mem_used_mb||0)/1024)+"/"+Math.round((d.mem_total_mb||0)/1024)+" GB)")+
    kv("Disk",worstDisk+"%")+kv("Uptime",fmtUptime(d.uptime_seconds))+'</div></div></details>';

  // --- updates (open if any) ---
  html+=accUpd(ups);
  // --- connections: external first (highlighted), then internal. Collapsed. ---
  const connRows = est.slice().sort((a,b)=>(isPriv(ipOf(a.remote))?1:0)-(isPriv(ipOf(b.remote))?1:0)).map(c=>{
    const x=!isPriv(ipOf(c.remote));
    return '<tr><td class="mono">'+(x?'<span class="dot-ext">● </span>':'')+esc(c.local)+' → '+esc(c.remote)+'</td><td class="mut">'+esc(c.process)+'</td></tr>';
  }).join("");
  html+='<details class="acc"><summary>Established connections <span class="n">'+est.length+'</span>'+
    (ext.length?' <span class="dot-ext" style="text-transform:none;letter-spacing:0">· '+ext.length+' external</span>':'')+'</summary>'+
    '<div class="body">'+(est.length?'<table class="mini"><tbody>'+connRows+'</tbody></table>':'<div class="empty">none</div>')+'</div></details>';
  // --- listening, services, startup, software (collapsed) ---
  html+=acc("Listening ports",lis.length,lis.map(c=>'<tr><td class="mono">'+esc(c.local)+'</td><td class="mut">'+esc(c.process)+'</td></tr>').join(""),false);
  html+=acc("Auto-start services",svcs.length,svcs.map(s=>'<tr><td>'+esc(s.name)+' <span class="mut">'+esc(s.state)+'</span></td><td class="mut mono">'+esc(s.path)+'</td></tr>').join(""),false);
  html+=acc("Startup items",starts.length,starts.map(s=>'<tr><td>'+esc(s.name)+' <span class="mut">'+esc(s.location)+'</span></td><td class="mut mono">'+esc(s.command)+'</td></tr>').join(""),starts.length<=8);
  html+=acc("Installed software",(h.software||[]).length,(h.software||[]).map(s=>'<tr><td>'+esc(s.name)+'</td><td class="mut">'+esc(s.version)+'</td></tr>').join(""),false);
  html+=acc("USB devices",(h.usb_devices||[]).length,(h.usb_devices||[]).map(u=>'<tr><td>'+esc(u.name)+'</td><td class="mut mono">'+esc(u.vid)+":"+esc(u.pid)+'</td></tr>').join(""),false);
  if((h.disk_health_warnings||[]).length) html+=acc("SMART warnings",h.disk_health_warnings.length,h.disk_health_warnings.map(w=>'<tr><td class="dot-ext">'+esc(w)+'</td></tr>').join(""),true);

  el.innerHTML=html;
}
function accUpd(ups){
  return acc("Pending updates",ups.length,ups.map(u=>'<tr><td>'+esc(u.id||u.name)+'</td><td class="mut">'+esc(u.current)+' → '+esc(u.available)+'</td></tr>').join(""),ups.length>0&&ups.length<=12);
}

async function refresh(){
  try {
    if (view==="detail") { updateAlertBadge(); return; }
    if (view==="ep") await loadEndpoints();
    else if (view==="al") await loadAlerts();
    else await loadTopology();
    updateAlertBadge();
  }
  catch(e){ document.getElementById("meta").textContent = "error: "+e.message; }
}
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
